input {
  jdbc {
    jdbc_driver_library => "/usr/share/logstash/postgresql-42.7.5.jar"
    jdbc_connection_string => "jdbc:postgresql://postgres:5432/${POSTGRES_DB}"
    jdbc_user => "${POSTGRES_USER}"
    jdbc_password => "${POSTGRES_PASSWORD}"
    jdbc_driver_class => "org.postgresql.Driver"
    statement => "SELECT id, title, body FROM posts"
    jdbc_paging_enabled => true
    jdbc_page_size => 500
    schedule => "*/5 * * * * *"
  }
}

output {
  elasticsearch {
    index => "posts"
    document_id => "%{id}"
    action => "index"
    hosts => "${ELASTIC_HOSTS}"
    user => "${ELASTIC_USER}"
    password => "${ELASTIC_PASSWORD}"
    cacert => "certs/ca/ca.crt"
  }
  stdout {
    codec => rubydebug
  }
}